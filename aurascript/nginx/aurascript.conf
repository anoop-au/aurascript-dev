# AuraScript — Nginx reverse proxy configuration
#
# Handles:
#   - www.aurascript.au  (primary)
#   - www.aurascript.store → 301 redirect to www.aurascript.au
#   - SSL termination via Certbot / Let's Encrypt
#   - WebSocket upgrade for /ws/ paths
#   - Large file uploads (750 MB)
#   - Security headers
#   - Gzip compression
#   - Nginx-level rate limiting on /transcribe

# ── Rate limiting zones ────────────────────────────────────────────────────────
# 10 req/s per IP on the transcription endpoint (extra protection on top of app)
limit_req_zone $binary_remote_addr zone=transcribe_limit:10m rate=10r/s;

# ── Upstream ───────────────────────────────────────────────────────────────────
upstream aurascript_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (both domains) ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.aurascript.au aurascript.au www.aurascript.store aurascript.store;

    # Let Certbot handle ACME challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.aurascript.au$request_uri;
    }
}

# ── www.aurascript.store → www.aurascript.au redirect ─────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aurascript.store aurascript.store;

    ssl_certificate     /etc/letsencrypt/live/www.aurascript.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.aurascript.store/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.aurascript.au$request_uri;
}

# ── Primary domain: www.aurascript.au ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aurascript.au aurascript.au;

    ssl_certificate     /etc/letsencrypt/live/www.aurascript.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.aurascript.au/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Upload size ────────────────────────────────────────────────────────────
    client_max_body_size 750M;
    client_body_timeout  300s;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies none always;

    # ── WebSocket paths — no rate limit, special upgrade headers ──────────────
    location /ws/ {
        proxy_pass         http://aurascript_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade (critical)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent WebSocket connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── Health endpoints — no rate limit ──────────────────────────────────────
    location /health {
        proxy_pass         http://aurascript_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Transcription endpoints — rate limited ─────────────────────────────────
    location /transcribe {
        limit_req zone=transcribe_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://aurascript_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file upload timeouts
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  10s;

        # Disable request buffering for streaming uploads
        proxy_request_buffering off;
    }

    # ── All other routes ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://aurascript_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Deny hidden files ──────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
